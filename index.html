<!doctype html>

<html lang="pl">

  <head>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Licznik dni życia</title>

  </head>

  <body class="bg-gray-50 flex items-center justify-center min-h-screen">



    <div class="bg-white p-8 rounded-lg shadow-md max-w-md w-full">

      <h1 class="text-2xl font-bold text-primary text-center mb-6">Licznik dni życia</h1>

     

      <form id="dateForm" class="flex flex-col gap-4">

        <div>

          <label for="birthDate" class="block text-sm font-medium text-gray-700 mb-1">Wybierz datę urodzenia:</label>

          <input type="date" id="birthDate" required class="w-full border border-gray-300 rounded p-2">

        </div>

       

        <button type="submit" class="bg-blue-300 p-4 rounded font-semibold hover:bg-blue-400 transition">

          Oblicz dni

        </button>

      </form>

    </div>



    <dialog id="resultDialog" class="bg-gray-200 text-red-600 p-6 rounded-lg shadow-xl relative max-w-sm w-full backdrop:bg-black/50">

      <button id="closeDialog" class="absolute top-2 right-2 text-gray-600 hover:text-black font-bold text-xl">&times;</button>

     

      <div class="text-center mt-2">

        <p id="dialogMessage" class="text-lg font-medium"></p>

      </div>

    </dialog>



    <script type="module" src="/src/main.js"></script>

  </body>

</html>
